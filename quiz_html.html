<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Какой ты игрок в мире ИИ? | Нина Тесейко</title>
<meta property="og:title" content="Какой ты игрок в мире ИИ?">
<meta property="og:description" content="7 вопросов — узнай свой уровень работы с ИИ и главные ошибки">
<meta property="og:url" content="https://nn-chanelle.github.io/quiz">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: #0d0d14;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    padding: 20px 16px;
    color: #fff;
  }
  #app { width: 100%; max-width: 540px; }

  .card {
    background: #12121c;
    border: 1px solid #1e1e2e;
    border-radius: 20px;
    padding: 28px 24px;
  }

  /* INTRO */
  .intro { text-align: center; }
  .intro-chars {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }
  .intro-chars svg { opacity: 0.5; transition: opacity .3s; }
  .intro-chars svg:last-child { opacity: 1; }
  .tag { font-size: 10px; letter-spacing: .2em; color: #4ade80; text-transform: uppercase; margin-bottom: 12px; display: block; }
  .intro h1 { font-size: 24px; font-weight: 900; line-height: 1.3; margin-bottom: 10px; }
  .intro p { font-size: 14px; color: #666; line-height: 1.6; margin-bottom: 28px; max-width: 360px; margin-left: auto; margin-right: auto; }
  .hint { font-size: 11px; color: #333; margin-top: 10px; }

  /* BTN */
  .btn-main {
    display: inline-block;
    padding: 14px 36px;
    background: linear-gradient(135deg, #4ade80, #22d3ee);
    color: #000;
    border: none;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 900;
    cursor: pointer;
    letter-spacing: .05em;
    width: 100%;
    transition: opacity .2s;
  }
  .btn-main:hover { opacity: .9; }
  .btn-secondary {
    display: block;
    width: 100%;
    padding: 13px;
    background: transparent;
    color: #444;
    border: 1px solid #222;
    border-radius: 12px;
    font-size: 13px;
    cursor: pointer;
    margin-top: 10px;
    font-family: inherit;
  }
  .btn-secondary:hover { color: #666; border-color: #333; }

  /* QUIZ HEADER */
  .quiz-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 18px;
  }
  .dots { display: flex; gap: 6px; }
  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #1e1e2e;
    transition: background .3s;
  }
  .dot.done { background: #4ade80; }
  .dot.current { background: #22d3ee; }
  .counter { font-size: 12px; color: #444; }

  /* PROGRESS */
  .progress-bar {
    height: 3px;
    background: #1a1a1a;
    border-radius: 2px;
    margin-bottom: 20px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #4ade80, #22d3ee);
    border-radius: 2px;
    transition: width .4s ease;
  }

  /* XP BAR */
  .xp-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    background: #0d0d14;
    border-radius: 8px;
    margin-bottom: 20px;
  }
  .xp-row span.label { font-size: 11px; color: #555; }
  .xp-row span.val { font-size: 13px; color: #4ade80; font-weight: 700; }
  .xp-mini-bar {
    flex: 1;
    height: 3px;
    background: #1a1a1a;
    border-radius: 2px;
    overflow: hidden;
  }
  .xp-mini-fill { height: 100%; background: #4ade80; border-radius: 2px; transition: width .4s; }

  /* QUESTION */
  .q-emoji { font-size: 20px; text-align: center; margin-bottom: 6px; }
  .q-text { font-size: 17px; font-weight: 700; color: #f0f0f0; line-height: 1.4; margin-bottom: 20px; text-align: center; }

  /* OPTIONS */
  .option {
    display: flex;
    align-items: center;
    gap: 12px;
    width: 100%;
    background: transparent;
    border: 1px solid #1e1e2e;
    border-radius: 10px;
    padding: 12px 16px;
    margin-bottom: 8px;
    color: #aaa;
    font-size: 13px;
    line-height: 1.5;
    text-align: left;
    cursor: pointer;
    transition: all .2s;
    font-family: inherit;
    position: relative;
  }
  .option:hover:not(.selected) { border-color: #2a2a2a; color: #ccc; }
  .option.selected { border-color: #4ade80; color: #fff; background: rgba(74,222,128,.08); }
  .opt-letter {
    width: 22px; height: 22px;
    border-radius: 6px;
    border: 1px solid #2a2a2a;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; color: #333;
    flex-shrink: 0; font-weight: 700;
    transition: all .2s;
  }
  .option.selected .opt-letter {
    border-color: #4ade80;
    color: #4ade80;
    background: rgba(74,222,128,.15);
  }
  .opt-text { flex: 1; }
  .xp-badge { font-size: 10px; color: #4ade80; font-weight: 700; flex-shrink: 0; }

  /* RESULT */
  .result-char {
    text-align: center;
    margin-bottom: 24px;
  }
  .char-box {
    display: inline-block;
    border-radius: 16px;
    padding: 20px 32px;
    margin-bottom: 16px;
  }
  .result-unlocked { font-size: 10px; letter-spacing: .2em; text-transform: uppercase; margin-bottom: 6px; display: block; }
  .result-level { font-size: 30px; font-weight: 900; margin-bottom: 4px; }
  .result-name { font-size: 13px; color: #666; }

  .xp-bar-wrap { margin-bottom: 24px; }
  .xp-bar-top { display: flex; justify-content: space-between; margin-bottom: 6px; }
  .xp-bar-top span:first-child { font-size: 10px; letter-spacing: .15em; color: #555; text-transform: uppercase; }
  .xp-bar-big { height: 6px; background: #1a1a1a; border-radius: 3px; overflow: hidden; }
  .xp-bar-big-fill { height: 100%; border-radius: 3px; transition: width .8s ease; }

  .result-desc {
    background: #0d0d14;
    border-radius: 10px;
    padding: 16px 18px;
    font-size: 14px;
    color: #bbb;
    line-height: 1.7;
    margin-bottom: 16px;
  }
  .result-cta-box {
    border-radius: 10px;
    padding: 16px 18px;
    margin-bottom: 20px;
  }
  .result-cta-label { font-size: 10px; letter-spacing: .15em; text-transform: uppercase; display: block; margin-bottom: 8px; }
  .result-cta-text { font-size: 13px; color: #ccc; line-height: 1.6; }
  .btn-guide {
    display: block;
    width: 100%;
    padding: 15px;
    color: #000;
    border: none;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 900;
    cursor: pointer;
    text-align: center;
    text-decoration: none;
    letter-spacing: .05em;
    margin-bottom: 10px;
    font-family: inherit;
  }

  @media (max-width: 400px) {
    .card { padding: 22px 16px; }
    .intro h1 { font-size: 20px; }
    .intro-chars svg { width: 60px; height: 68px; }
  }
</style>
</head>
<body>
<div id="app"></div>

<script>
const GUIDE_URL = "https://nn-chanelle.github.io";

const questions = [
  { emoji:"💬", text:"Как обычно выглядит твой запрос к ИИ?", options:[
    {text:"«Напиши мне пост» или «Помоги с текстом»", score:0},
    {text:"Описываю тему и примерно что нужно", score:1},
    {text:"Даю контекст, задачу, аудиторию и формат", score:2},
    {text:"Роль → контекст → задача → формат — всегда", score:3},
  ]},
  { emoji:"😤", text:"ИИ выдал результат, который тебя не устраивает. Что делаешь?", options:[
    {text:"Закрываю — «ИИ бесполезен»", score:0},
    {text:"Прошу переделать, но примерно так же", score:1},
    {text:"Даю конкретные замечания и правки", score:2},
    {text:"3–5 итераций с точными правками каждый раз", score:3},
  ]},
  { emoji:"🔍", text:"ИИ уверенно назвал факт, дату или цифру. Ты...", options:[
    {text:"Использую как есть — раз говорит, значит знает", score:0},
    {text:"Иногда проверяю, если что-то кажется странным", score:1},
    {text:"Проверяю всё важное для результата", score:2},
    {text:"Факты из ИИ — только отправная точка. Всегда.", score:3},
  ]},
  { emoji:"📋", text:"Какие задачи ты отдаёшь ИИ без проверки?", options:[
    {text:"Всё — зачем проверять, он же умный", score:0},
    {text:"Тексты и переводы — обычно норм", score:1},
    {text:"Только рутину: форматирование, шаблоны, заголовки", score:2},
    {text:"Ничего — всегда хотя бы просматриваю", score:3},
  ]},
  { emoji:"🧠", text:"Ты обращался к ИИ за советом по личному или бизнес-решению?", options:[
    {text:"Да, он понимает меня лучше, чем многие люди", score:0},
    {text:"Иногда — когда не с кем поговорить", score:1},
    {text:"Использую как источник инфо, решение принимаю сам", score:2},
    {text:"ИИ даёт данные, я несу ответственность — чётко разделяю", score:3},
  ]},
  { emoji:"🛠️", text:"Как ты выбираешь, какой ИИ использовать?", options:[
    {text:"ChatGPT — и всё, больше ничего не знаю", score:0},
    {text:"Пробовал разные, использую один привычный", score:1},
    {text:"Знаю сильные стороны 2–3 инструментов", score:2},
    {text:"Подбираю инструмент под тип задачи осознанно", score:3},
  ]},
  { emoji:"📁", text:"Есть ли у тебя свои шаблоны промптов для повторяющихся задач?", options:[
    {text:"Нет, каждый раз пишу заново как придётся", score:0},
    {text:"Примерно помню что работало, но не фиксирую", score:1},
    {text:"Есть несколько сохранённых, иногда использую", score:2},
    {text:"Да, веду базу промптов и регулярно обновляю", score:3},
  ]},
];

const CHARS = [
  { label:"НОВИЧОК", name:"Растерянный юзер", color:"#f87171", bg:"rgba(248,113,113,0.1)", border:"rgba(248,113,113,0.3)",
    desc:"Ты используешь ИИ интуитивно, и он чаще разочаровывает, чем помогает. Расплывчатые запросы, отсутствие итераций, слепое доверие к результатам — классические ошибки, с которых начинают все. Хорошая новость: это полностью исправляемо.",
    cta:"В гайде — конкретные схемы и шаблоны, которые меняют качество работы с первого применения.",
    svg:`<svg viewBox="0 0 80 90" width="80" height="90"><circle cx="40" cy="30" r="22" fill="#1e1e2e" stroke="#f87171" stroke-width="2"/><circle cx="32" cy="27" r="3" fill="#f87171"/><circle cx="48" cy="27" r="3" fill="#f87171"/><path d="M32 40 Q40 36 48 40" stroke="#f87171" stroke-width="2" fill="none" stroke-linecap="round"/><rect x="28" y="52" width="24" height="28" rx="6" fill="#1e1e2e" stroke="#f87171" stroke-width="2"/><text x="29" y="22" font-size="10" fill="#f87171" font-weight="bold">?</text><text x="47" y="20" font-size="8" fill="#f87171">?</text><text x="19" y="30" font-size="9" fill="#f87171">??</text></svg>` },
  { label:"ПОЛЬЗОВАТЕЛЬ", name:"Любопытный исследователь", color:"#fb923c", bg:"rgba(251,146,60,0.1)", border:"rgba(251,146,60,0.3)",
    desc:"Иногда ИИ выдаёт то, что нужно. Иногда — нет. И ты не всегда понимаешь почему. Скорее всего нет системы: ни в постановке задач, ни в проверке результатов, ни в выборе инструментов. Ещё немного — и всё станет предсказуемым.",
    cta:"Гайд даёт именно это — структуру, которая делает работу с ИИ стабильной и предсказуемой.",
    svg:`<svg viewBox="0 0 80 90" width="80" height="90"><circle cx="40" cy="28" r="22" fill="#1e1e2e" stroke="#fb923c" stroke-width="2"/><circle cx="33" cy="26" r="3" fill="#fb923c"/><circle cx="47" cy="26" r="3" fill="#fb923c"/><path d="M33 37 Q40 42 47 37" stroke="#fb923c" stroke-width="2" fill="none" stroke-linecap="round"/><rect x="27" y="50" width="26" height="28" rx="6" fill="#1e1e2e" stroke="#fb923c" stroke-width="2"/><rect x="18" y="54" width="10" height="18" rx="4" fill="#1e1e2e" stroke="#fb923c" stroke-width="1.5"/><rect x="52" y="54" width="10" height="18" rx="4" fill="#1e1e2e" stroke="#fb923c" stroke-width="1.5"/><circle cx="14" cy="16" r="5" fill="none" stroke="#fb923c" stroke-width="1.5"/><line x1="18" y1="20" x2="22" y2="24" stroke="#fb923c" stroke-width="1.5" stroke-linecap="round"/></svg>` },
  { label:"ПРАКТИК", name:"Умелый делегатор", color:"#a78bfa", bg:"rgba(167,139,250,0.1)", border:"rgba(167,139,250,0.3)",
    desc:"У тебя есть база: ты понимаешь как работает ИИ, делаешь итерации, не доверяешь слепо. Но скорее всего работаешь каждый раз заново, без шаблонов. Следующий шаг — делегировать целые потоки задач, а не отдельные запросы.",
    cta:"В гайде — схема делегирования и шаблоны промптов для выхода на следующий уровень.",
    svg:`<svg viewBox="0 0 80 90" width="80" height="90"><polygon points="40,4 44,14 40,12 36,14" fill="#a78bfa" opacity="0.7"/><circle cx="40" cy="26" r="20" fill="#1e1e2e" stroke="#a78bfa" stroke-width="2"/><circle cx="33" cy="24" r="3" fill="#a78bfa"/><circle cx="47" cy="24" r="3" fill="#a78bfa"/><path d="M33 34 Q40 40 47 34" stroke="#a78bfa" stroke-width="2.5" fill="none" stroke-linecap="round"/><rect x="26" y="46" width="28" height="32" rx="6" fill="#1e1e2e" stroke="#a78bfa" stroke-width="2"/><rect x="14" y="48" width="13" height="20" rx="4" fill="#1e1e2e" stroke="#a78bfa" stroke-width="1.5"/><rect x="53" y="48" width="13" height="20" rx="4" fill="#1e1e2e" stroke="#a78bfa" stroke-width="1.5"/><rect x="30" y="50" width="20" height="10" rx="2" fill="#a78bfa" opacity="0.3"/></svg>` },
  { label:"МАСТЕР", name:"Архитектор систем", color:"#4ade80", bg:"rgba(74,222,128,0.1)", border:"rgba(74,222,128,0.3)",
    desc:"Ты понимаешь сильные стороны инструментов, ставишь задачи чётко, итерируешь и не отдаёшь ИИ ответственность за решения. Ты в топ-5% пользователей. Вопрос — а можешь ли ты научить этому других?",
    cta:"Гайд пригодится, если хочешь системно передать эти навыки команде или аудитории.",
    svg:`<svg viewBox="0 0 80 90" width="80" height="90"><polygon points="40,2 46,14 40,11 34,14" fill="#4ade80"/><circle cx="40" cy="26" r="20" fill="#1e1e2e" stroke="#4ade80" stroke-width="2.5"/><circle cx="33" cy="23" r="3.5" fill="#4ade80"/><circle cx="47" cy="23" r="3.5" fill="#4ade80"/><path d="M32 34 Q40 41 48 34" stroke="#4ade80" stroke-width="2.5" fill="none" stroke-linecap="round"/><rect x="25" y="46" width="30" height="32" rx="7" fill="#1e1e2e" stroke="#4ade80" stroke-width="2.5"/><rect x="12" y="47" width="14" height="22" rx="5" fill="#1e1e2e" stroke="#4ade80" stroke-width="2"/><rect x="54" y="47" width="14" height="22" rx="5" fill="#1e1e2e" stroke="#4ade80" stroke-width="2"/><circle cx="40" cy="62" r="8" fill="#4ade80" opacity="0.15" stroke="#4ade80" stroke-width="1"/><text x="40" y="67" font-size="11" fill="#4ade80" text-anchor="middle" font-weight="bold">✦</text><circle cx="20" cy="20" r="3" fill="#4ade80" opacity="0.5"/><circle cx="60" cy="18" r="2" fill="#4ade80" opacity="0.4"/></svg>` },
];

function getResult(score) {
  if (score <= 6)  return CHARS[0];
  if (score <= 13) return CHARS[1];
  if (score <= 17) return CHARS[2];
  return CHARS[3];
}

// STATE
let phase = "intro";
let current = 0;
let score = 0;
let selected = null;
const TOTAL = questions.length;

function render() {
  const app = document.getElementById("app");
  if (phase === "intro")  { app.innerHTML = renderIntro(); return; }
  if (phase === "result") { app.innerHTML = renderResult(); bindResult(); return; }
  app.innerHTML = renderQuiz();
  bindQuiz();
}

function renderIntro() {
  return `
  <div class="intro">
    <div class="intro-chars">
      ${CHARS.map((c,i) => `<div style="opacity:${0.3+i*0.23}">${c.svg}</div>`).join("")}
    </div>
    <span class="tag">Нина Тесейко · @nn_chnl</span>
    <h1>Какой ты игрок<br>в мире ИИ?</h1>
    <p>7 вопросов — узнай свой уровень, главные ошибки и как их исправить</p>
    <button class="btn-main" onclick="startQuiz()">НАЧАТЬ ИГРУ →</button>
    <div class="hint">~2 минуты</div>
  </div>`;
}

function renderQuiz() {
  const q = questions[current];
  const pct = Math.round((current / TOTAL) * 100);
  const xpPct = Math.round((score / 21) * 100);
  const letters = ["A","B","C","D"];
  const xpLabels = ["0 XP","+1 XP","+2 XP","+3 XP"];

  const dots = Array.from({length: TOTAL}, (_,i) => {
    let cls = "dot";
    if (i < current) cls += " done";
    else if (i === current) cls += " current";
    return `<div class="${cls}"></div>`;
  }).join("");

  const opts = q.options.map((o,i) => {
    const sel = selected === i;
    return `
    <button class="option${sel?" selected":""}" onclick="selectOpt(${i})">
      <span class="opt-letter">${sel?"✓":letters[i]}</span>
      <span class="opt-text">${o.text}</span>
      ${sel?`<span class="xp-badge">${xpLabels[o.score]}</span>`:""}
    </button>`;
  }).join("");

  const isLast = current + 1 === TOTAL;
  const btnActive = selected !== null;

  return `
  <div class="card">
    <div class="quiz-header">
      <span class="tag" style="margin:0">@nn_chnl</span>
      <div class="dots">${dots}</div>
      <span class="counter">${current+1}/${TOTAL}</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="xp-row">
      <span>⚡</span>
      <span class="label">Накоплено XP:</span>
      <span class="val">${score}</span>
      <div class="xp-mini-bar"><div class="xp-mini-fill" style="width:${xpPct}%"></div></div>
    </div>
    <div class="q-emoji">${q.emoji}</div>
    <div class="q-text">${q.text}</div>
    ${opts}
    <button class="btn-main" style="${btnActive?"":"background:#1a1a1a;color:#333;cursor:default"}" onclick="nextQ()">
      ${isLast?"🏆 УЗНАТЬ СВОЙ УРОВЕНЬ":"СЛЕДУЮЩИЙ ВОПРОС →"}
    </button>
  </div>`;
}

function renderResult() {
  const r = getResult(score);
  const xpPct = Math.round((score / 21) * 100);
  return `
  <div class="card" style="border-color:${r.border}">
    <div class="result-char">
      <div class="char-box" style="background:${r.bg};border:1px solid ${r.border}">
        ${r.svg}
      </div>
      <span class="result-unlocked" style="color:${r.color}">УРОВЕНЬ РАЗБЛОКИРОВАН</span>
      <div class="result-level">${r.label}</div>
      <div class="result-name">${r.name}</div>
    </div>

    <div class="xp-bar-wrap">
      <div class="xp-bar-top">
        <span>Опыт</span>
        <span style="font-size:11px;color:${r.color};font-weight:700">${score} / 21 XP</span>
      </div>
      <div class="xp-bar-big">
        <div class="xp-bar-big-fill" id="xpFill" style="width:0%;background:linear-gradient(90deg,${r.color}88,${r.color})"></div>
      </div>
    </div>

    <div class="result-desc">${r.desc}</div>

    <div class="result-cta-box" style="background:${r.bg};border:1px solid ${r.border}">
      <span class="result-cta-label" style="color:${r.color}">🎯 Следующий шаг</span>
      <div class="result-cta-text">${r.cta}</div>
    </div>

    <a href="${GUIDE_URL}" target="_blank" class="btn-guide" style="background:linear-gradient(135deg,${r.color},#22d3ee)">
      КАК ОБЩАТЬСЯ И ДЕЛЕГИРОВАТЬ ИИ →
    </a>
    <button class="btn-secondary" onclick="restart()">играть снова</button>
  </div>`;
}

function bindQuiz() {}
function bindResult() {
  setTimeout(() => {
    const fill = document.getElementById("xpFill");
    if (fill) fill.style.width = Math.round((score/21)*100)+"%";
  }, 100);
}

function startQuiz() { phase = "quiz"; render(); }
function selectOpt(i) { selected = i; render(); }
function nextQ() {
  if (selected === null) return;
  score += questions[current].options[selected].score;
  selected = null;
  if (current + 1 >= TOTAL) { phase = "result"; }
  else { current++; }
  render();
}
function restart() { phase = "intro"; current = 0; score = 0; selected = null; render(); }

render();
</script>
</body>
</html>
